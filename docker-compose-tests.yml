include:
  - path:
      - docker-compose.yml     # depend on the main docker-compose file
      - docker-compose-tests_include-override.yml  # include override for tests

services:
  # *****
  # Tests
  # *****
  # Frontend Tests
  frontendTests:
    image: ${IMAGE_NAME}:${DEMO_VERSION}-client-transaction-portal-tests
    container_name: client-transaction-portal-tests
    build:
      context: ./
      dockerfile: ./src/frontend/Dockerfile.cypress
    volumes:
      - ./src/frontend/cypress/videos:/app/cypress/videos
      - ./src/frontend/cypress/screenshots:/app/cypress/screenshots
    environment:
      - CYPRESS_baseUrl=http://${FRONTEND_ADDR}
      - FRONTEND_ADDR
      - NODE_ENV=production
    depends_on:
      - client-transaction-portal

  # Tracebased Tests
  traceBasedTests:
    image: ${IMAGE_NAME}:${DEMO_VERSION}-traceBasedTests
    container_name: traceBasedTests
    build:
      context: ./
      dockerfile: ./test/tracetesting/Dockerfile
      args:
        TRACETEST_IMAGE_VERSION: ${TRACETEST_IMAGE_VERSION}
    environment:
      - AD_ADDR
      - CART_ADDR
      - CHECKOUT_ADDR
      - CURRENCY_ADDR
      - EMAIL_ADDR
      - FRONTEND_ADDR
      - PAYMENT_ADDR
      - PRODUCT_CATALOG_ADDR
      - PRODUCT_REVIEWS_ADDR
      - RECOMMENDATION_ADDR
      - SHIPPING_ADDR
      - KAFKA_ADDR
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./test/tracetesting:/app/test/tracetesting
      - ./pb:/app/pb
    depends_on:
      tracetest-server:
        condition: service_healthy
      # adding demo services as dependencies
      ledger-booking:
        condition: service_started
      market-news:
        condition: service_started
      transaction-staging:
        condition: service_started
      payment-orchestration:
        condition: service_started
      fx-rate:
        condition: service_started
      client-notification:
        condition: service_started
      risk-compliance:
        condition: service_started
      client-transaction-portal:
        condition: service_started
      llm:
        condition: service_started
      payment-gateway:
        condition: service_started
      reference-data:
        condition: service_started
      transaction-audit:
        condition: service_started
      pricing-quote:
        condition: service_started
      ops-recommendation:
        condition: service_started
      settlement:
        condition: service_started
      incident-control:
        condition: service_started
      transaction-event-stream:
        condition: service_started

  tracetest-server:
    image: ${TRACETEST_IMAGE}
    platform: linux/amd64
    container_name: tracetest-server
    volumes:
      - type: bind
        source: ./test/tracetesting/tracetest-config.yaml
        target: /app/tracetest.yaml
      - type: bind
        source: ./test/tracetesting/tracetest-provision.yaml
        target: /app/provision.yaml
    command: --provisioning-file /app/provision.yaml
    ports:
      - 11633:11633
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      tracetest-postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "--spider", "localhost:11633" ]
      interval: 1s
      timeout: 3s
      retries: 60

  tracetest-postgres:
    image: ${POSTGRES_IMAGE}
    container_name: tracetest-postgres
    environment:
      - POSTGRES_PASSWORD
    healthcheck:
      test: pg_isready
      interval: 1s
      timeout: 5s
      retries: 60
    ports:
      - 5432
