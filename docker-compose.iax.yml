# OpenTelemetry Demo for ITRS Analytics (IAX)
#
# All telemetry (traces, metrics, logs) is exported via OTLP/gRPC to an
# IAX instance. Local observability backends (Jaeger, Prometheus,
# OpenSearch, Grafana) are removed.
#
# Usage:
#   1. Edit .env.iax and set IAX_OTLP_ENDPOINT to your IAX ingestion address
#   2. docker compose --env-file .env --env-file .env.iax -f docker-compose.iax.yml up -d
#   3. Open http://localhost:8080 for the demo storefront
#   4. Open http://localhost:8080/loadgen/ for the load generator UI

x-default-logging: &logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "2"

networks:
  default:
    name: otel-demo-iax
    driver: bridge

services:
  # ******************
  # Core Demo Services
  # ******************

  ledger-booking:
    image: ${IMAGE_REGISTRY}/ledger-booking:${VERSION}
    container_name: ledger-booking
    build:
      context: ./
      dockerfile: ${ACCOUNTING_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/ledger-booking:${VERSION}
    deploy:
      resources:
        limits:
          memory: 160M
    restart: unless-stopped
    environment:
      - KAFKA_ADDR
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://${OTEL_COLLECTOR_HOST}:${OTEL_COLLECTOR_PORT_HTTP}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=low
      - OTEL_SERVICE_NAME=ledger-booking
      - DB_CONNECTION_STRING=Host=${POSTGRES_HOST};Username=astronomy_user;Password=${POSTGRES_ASTRONOMY_PASSWORD};Database=astronomy_db
      - OTEL_DOTNET_AUTO_TRACES_ENTITYFRAMEWORKCORE_INSTRUMENTATION_ENABLED=false
    depends_on:
      otel-collector:
        condition: service_started
      transaction-event-stream:
        condition: service_healthy
    logging: *logging

  market-news:
    image: ${IMAGE_REGISTRY}/market-news:${VERSION}
    container_name: market-news
    build:
      context: ./
      dockerfile: ${AD_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/market-news:${VERSION}
      args:
        OTEL_JAVA_AGENT_VERSION: ${OTEL_JAVA_AGENT_VERSION}
    deploy:
      resources:
        limits:
          memory: 300M
    restart: unless-stopped
    ports:
      - "${AD_PORT}"
    environment:
      - AD_PORT
      - FLAGD_HOST
      - FLAGD_PORT
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://${OTEL_COLLECTOR_HOST}:${OTEL_COLLECTOR_PORT_HTTP}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=medium
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_SERVICE_NAME=market-news
    depends_on:
      otel-collector:
        condition: service_started
      incident-control:
        condition: service_started
    logging: *logging

  transaction-staging:
    image: ${IMAGE_REGISTRY}/transaction-staging:${VERSION}
    container_name: transaction-staging
    build:
      context: ./
      dockerfile: ${CART_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/transaction-staging:${VERSION}
    deploy:
      resources:
        limits:
          memory: 160M
    restart: unless-stopped
    ports:
      - "${CART_PORT}"
    environment:
      - CART_PORT
      - FLAGD_HOST
      - FLAGD_PORT
      - VALKEY_ADDR
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=high
      - OTEL_SERVICE_NAME=transaction-staging
      - ASPNETCORE_URLS=http://*:${CART_PORT}
    depends_on:
      valkey-cart:
        condition: service_started
      otel-collector:
        condition: service_started
      incident-control:
        condition: service_started
    logging: *logging

  payment-orchestration:
    image: ${IMAGE_REGISTRY}/payment-orchestration:${VERSION}
    container_name: payment-orchestration
    build:
      context: ./
      dockerfile: ${CHECKOUT_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/payment-orchestration:${VERSION}
    deploy:
      resources:
        limits:
          memory: 20M
    restart: unless-stopped
    ports:
      - "${CHECKOUT_PORT}"
    environment:
      - FLAGD_HOST
      - FLAGD_PORT
      - CHECKOUT_PORT
      - CART_ADDR
      - CURRENCY_ADDR
      - EMAIL_ADDR
      - PAYMENT_ADDR
      - PRODUCT_CATALOG_ADDR
      - SHIPPING_ADDR
      - KAFKA_ADDR
      - GOMEMLIMIT=16MiB
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=critical
      - OTEL_SERVICE_NAME=payment-orchestration
    depends_on:
      transaction-staging:
        condition: service_started
      fx-rate:
        condition: service_started
      client-notification:
        condition: service_started
      payment-gateway:
        condition: service_started
      reference-data:
        condition: service_started
      settlement:
        condition: service_started
      otel-collector:
        condition: service_started
      transaction-event-stream:
        condition: service_healthy
      incident-control:
        condition: service_started
    logging: *logging

  fx-rate:
    image: ${IMAGE_REGISTRY}/fx-rate:${VERSION}
    container_name: fx-rate
    build:
      context: ./
      dockerfile: ${CURRENCY_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/fx-rate:${VERSION}
      args:
        OPENTELEMETRY_CPP_VERSION: ${OPENTELEMETRY_CPP_VERSION}
    deploy:
      resources:
        limits:
          memory: 20M
    restart: unless-stopped
    ports:
      - "${CURRENCY_PORT}"
    environment:
      - CURRENCY_PORT
      - IPV6_ENABLED
      - VERSION=${VERSION}
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=high
      - OTEL_SERVICE_NAME=fx-rate
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  client-notification:
    image: ${IMAGE_REGISTRY}/client-notification:${VERSION}
    container_name: client-notification
    build:
      context: ./
      dockerfile: ${EMAIL_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/client-notification:${VERSION}
    deploy:
      resources:
        limits:
          memory: 100M
    restart: unless-stopped
    ports:
      - "${EMAIL_PORT}"
    environment:
      - APP_ENV=production
      - EMAIL_PORT
      - FLAGD_HOST
      - FLAGD_PORT
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://${OTEL_COLLECTOR_HOST}:${OTEL_COLLECTOR_PORT_HTTP}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=medium
      - OTEL_SERVICE_NAME=client-notification
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  risk-compliance:
    image: ${IMAGE_REGISTRY}/risk-compliance:${VERSION}
    container_name: risk-compliance
    build:
      context: ./
      dockerfile: ${FRAUD_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/risk-compliance:${VERSION}
      args:
        OTEL_JAVA_AGENT_VERSION: ${OTEL_JAVA_AGENT_VERSION}
    deploy:
      resources:
        limits:
          memory: 300M
    restart: unless-stopped
    environment:
      - FLAGD_HOST
      - FLAGD_PORT
      - KAFKA_ADDR
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://${OTEL_COLLECTOR_HOST}:${OTEL_COLLECTOR_PORT_HTTP}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_INSTRUMENTATION_KAFKA_EXPERIMENTAL_SPAN_ATTRIBUTES=true
      - OTEL_INSTRUMENTATION_MESSAGING_EXPERIMENTAL_RECEIVE_TELEMETRY_ENABLED=true
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=low
      - OTEL_SERVICE_NAME=risk-compliance
    depends_on:
      otel-collector:
        condition: service_started
      transaction-event-stream:
        condition: service_healthy
    logging: *logging

  client-transaction-portal:
    image: ${IMAGE_REGISTRY}/client-transaction-portal:${VERSION}
    container_name: client-transaction-portal
    build:
      context: ./
      dockerfile: ${FRONTEND_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/client-transaction-portal:${VERSION}
    deploy:
      resources:
        limits:
          memory: 250M
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}"
    environment:
      - PORT=${FRONTEND_PORT}
      - FRONTEND_ADDR
      - AD_ADDR
      - CART_ADDR
      - CHECKOUT_ADDR
      - CURRENCY_ADDR
      - PRODUCT_CATALOG_ADDR
      - PRODUCT_REVIEWS_ADDR
      - RECOMMENDATION_ADDR
      - SHIPPING_ADDR
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=critical
      - ENV_PLATFORM
      - OTEL_SERVICE_NAME=client-transaction-portal
      - PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - WEB_OTEL_SERVICE_NAME=frontend-web
      - OTEL_COLLECTOR_HOST
      - FLAGD_HOST
      - FLAGD_PORT
    depends_on:
      market-news:
        condition: service_started
      transaction-staging:
        condition: service_started
      payment-orchestration:
        condition: service_started
      fx-rate:
        condition: service_started
      reference-data:
        condition: service_started
      pricing-quote:
        condition: service_started
      ops-recommendation:
        condition: service_started
      settlement:
        condition: service_started
      otel-collector:
        condition: service_started
      document-imaging:
        condition: service_started
      incident-control:
        condition: service_started
    logging: *logging

  transaction-api-gateway:
    image: ${IMAGE_REGISTRY}/transaction-api-gateway:${VERSION}
    container_name: transaction-api-gateway
    build:
      context: ./
      dockerfile: ${FRONTEND_PROXY_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/transaction-api-gateway:${VERSION}
    deploy:
      resources:
        limits:
          memory: 65M
    restart: unless-stopped
    ports:
      - "${ENVOY_PORT}:${ENVOY_PORT}"
      - "${ENVOY_ADMIN_PORT}:${ENVOY_ADMIN_PORT}"
    environment:
      - FRONTEND_PORT
      - FRONTEND_HOST
      - LOCUST_WEB_HOST
      - LOCUST_WEB_PORT
      - OTEL_COLLECTOR_HOST
      - IMAGE_PROVIDER_HOST
      - IMAGE_PROVIDER_PORT
      - OTEL_COLLECTOR_PORT_GRPC
      - OTEL_COLLECTOR_PORT_HTTP
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=critical
      - OTEL_SERVICE_NAME=transaction-api-gateway
      - ENVOY_PORT
      - ENVOY_ADDR
      - ENVOY_ADMIN_PORT
      - FLAGD_HOST
      - FLAGD_PORT
      # Envoy template references these clusters even though the services are
      # removed. Values come from .env; routes will 503 harmlessly.
      - GRAFANA_PORT
      - GRAFANA_HOST
      - JAEGER_UI_PORT
      - JAEGER_HOST
      - FLAGD_UI_HOST
      - FLAGD_UI_PORT
      - TELEMETRY_DOCS_HOST
      - TELEMETRY_DOCS_PORT
    depends_on:
      client-transaction-portal:
        condition: service_started
      simulated-market-activity:
        condition: service_started
    dns_search: ""

  document-imaging:
    image: ${IMAGE_REGISTRY}/document-imaging:${VERSION}
    container_name: document-imaging
    build:
      context: ./
      dockerfile: ${IMAGE_PROVIDER_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/document-imaging:${VERSION}
    deploy:
      resources:
        limits:
          memory: 120M
    restart: unless-stopped
    ports:
      - "${IMAGE_PROVIDER_PORT}"
    environment:
      - IMAGE_PROVIDER_PORT
      - OTEL_COLLECTOR_HOST
      - OTEL_COLLECTOR_PORT_GRPC
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=low
      - OTEL_SERVICE_NAME=document-imaging
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  simulated-market-activity:
    image: ${IMAGE_REGISTRY}/simulated-market-activity:${VERSION}
    container_name: simulated-market-activity
    build:
      context: ./
      dockerfile: ${LOAD_GENERATOR_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/simulated-market-activity:${VERSION}
    deploy:
      resources:
        limits:
          memory: 1500M
    restart: unless-stopped
    ports:
      - "${LOCUST_WEB_PORT}"
    environment:
      - LOCUST_WEB_PORT
      - LOCUST_USERS
      - LOCUST_HOST
      - LOCUST_HEADLESS
      - LOCUST_AUTOSTART
      - LOCUST_BROWSER_TRAFFIC_ENABLED=false
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=low
      - OTEL_SERVICE_NAME=simulated-market-activity
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
      - LOCUST_WEB_HOST=0.0.0.0
      - FLAGD_HOST
      - FLAGD_PORT
      - FLAGD_OFREP_PORT
    depends_on:
      client-transaction-portal:
        condition: service_started
      incident-control:
        condition: service_started
    logging: *logging

  payment-gateway:
    image: ${IMAGE_REGISTRY}/payment-gateway:${VERSION}
    container_name: payment-gateway
    build:
      context: ./
      dockerfile: ${PAYMENT_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/payment-gateway:${VERSION}
    deploy:
      resources:
        limits:
          memory: 140M
    restart: unless-stopped
    ports:
      - "${PAYMENT_PORT}"
    environment:
      - IPV6_ENABLED
      - PAYMENT_PORT
      - FLAGD_HOST
      - FLAGD_PORT
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=critical
      - OTEL_SERVICE_NAME=payment-gateway
    depends_on:
      otel-collector:
        condition: service_started
      incident-control:
        condition: service_started
    logging: *logging

  reference-data:
    image: ${IMAGE_REGISTRY}/reference-data:${VERSION}
    container_name: reference-data
    build:
      context: ./
      dockerfile: ${PRODUCT_CATALOG_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/reference-data:${VERSION}
    deploy:
      resources:
        limits:
          memory: 20M
    restart: unless-stopped
    ports:
      - "${PRODUCT_CATALOG_PORT}"
    environment:
      - PRODUCT_CATALOG_PORT
      - FLAGD_HOST
      - FLAGD_PORT
      - GOMEMLIMIT=16MiB
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=high
      - OTEL_SERVICE_NAME=reference-data
      - OTEL_CONFIG_FILE=/otel-config.yml
      - OTEL_SEMCONV_STABILITY_OPT_IN=database
      - DB_CONNECTION_STRING=postgres://astronomy_user:${POSTGRES_ASTRONOMY_PASSWORD}@${POSTGRES_HOST}/astronomy_db?sslmode=disable
    depends_on:
      otel-collector:
        condition: service_started
      incident-control:
        condition: service_started
      astronomy-db:
        condition: service_started
    volumes:
      - ./otel-config.yml:/otel-config.yml
    logging: *logging

  transaction-audit:
    image: ${IMAGE_REGISTRY}/transaction-audit:${VERSION}
    container_name: transaction-audit
    build:
      context: ./
      dockerfile: ${PRODUCT_REVIEWS_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/transaction-audit:${VERSION}
    deploy:
      resources:
        limits:
          memory: 100M
    restart: unless-stopped
    ports:
      - "${PRODUCT_REVIEWS_PORT}"
    environment:
      - PRODUCT_REVIEWS_PORT
      - OTEL_PYTHON_LOG_CORRELATION=true
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=medium
      - OTEL_SERVICE_NAME=transaction-audit
      - OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT=true
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
      - DB_CONNECTION_STRING=host=${POSTGRES_HOST} user=astronomy_user password=${POSTGRES_ASTRONOMY_PASSWORD} dbname=astronomy_db
      - LLM_BASE_URL
      - OPENAI_API_KEY
      - LLM_MODEL
      - PRODUCT_CATALOG_ADDR
      - FLAGD_HOST
      - FLAGD_PORT
      - LLM_HOST
      - LLM_PORT
    depends_on:
      reference-data:
        condition: service_started
      llm:
        condition: service_started
      astronomy-db:
        condition: service_started
      otel-collector:
        condition: service_started
    logging: *logging

  pricing-quote:
    image: ${IMAGE_REGISTRY}/pricing-quote:${VERSION}
    container_name: pricing-quote
    build:
      context: ./
      dockerfile: ${QUOTE_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/pricing-quote:${VERSION}
    deploy:
      resources:
        limits:
          memory: 40M
    restart: unless-stopped
    ports:
      - "${QUOTE_PORT}"
    environment:
      - IPV6_ENABLED
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://${OTEL_COLLECTOR_HOST}:${OTEL_COLLECTOR_PORT_HTTP}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_PHP_AUTOLOAD_ENABLED=true
      - QUOTE_PORT
      - OTEL_PHP_INTERNAL_METRICS_ENABLED=true
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=low
      - OTEL_SERVICE_NAME=pricing-quote
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  ops-recommendation:
    image: ${IMAGE_REGISTRY}/ops-recommendation:${VERSION}
    container_name: ops-recommendation
    build:
      context: ./
      dockerfile: ${RECOMMENDATION_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/ops-recommendation:${VERSION}
    deploy:
      resources:
        limits:
          memory: 500M
    restart: unless-stopped
    ports:
      - "${RECOMMENDATION_PORT}"
    environment:
      - RECOMMENDATION_PORT
      - PRODUCT_CATALOG_ADDR
      - FLAGD_HOST
      - FLAGD_PORT
      - OTEL_PYTHON_LOG_CORRELATION=true
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=medium
      - OTEL_SERVICE_NAME=ops-recommendation
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
    depends_on:
      reference-data:
        condition: service_started
      otel-collector:
        condition: service_started
      incident-control:
        condition: service_started
    logging: *logging

  settlement:
    image: ${IMAGE_REGISTRY}/settlement:${VERSION}
    container_name: settlement
    build:
      context: ./
      dockerfile: ${SHIPPING_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/settlement:${VERSION}
    deploy:
      resources:
        limits:
          memory: 20M
    restart: unless-stopped
    ports:
      - "${SHIPPING_PORT}"
    environment:
      - IPV6_ENABLED
      - SHIPPING_PORT
      - QUOTE_ADDR
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=high
      - OTEL_SERVICE_NAME=settlement
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  # ******************
  # Dependent Services
  # ******************

  incident-control:
    image: ${FLAGD_IMAGE}
    container_name: incident-control
    deploy:
      resources:
        limits:
          memory: 75M
    restart: unless-stopped
    environment:
      - FLAGD_OTEL_COLLECTOR_URI=${OTEL_COLLECTOR_HOST}:${OTEL_COLLECTOR_PORT_GRPC}
      - FLAGD_METRICS_EXPORTER=otel
      - GOMEMLIMIT=60MiB
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=low
      - OTEL_SERVICE_NAME=incident-control
    command: [
      "start",
      "--uri",
      "file:./etc/flagd/demo.flagd.json"
    ]
    ports:
      - "${FLAGD_PORT}"
      - "${FLAGD_OFREP_PORT}"
    volumes:
      - ./src/flagd:/etc/flagd
    logging: *logging

  transaction-event-stream:
    image: ${IMAGE_REGISTRY}/transaction-event-stream:${VERSION}
    container_name: transaction-event-stream
    build:
      context: ./
      dockerfile: ${KAFKA_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/transaction-event-stream:${VERSION}
      args:
        OTEL_JAVA_AGENT_VERSION: ${OTEL_JAVA_AGENT_VERSION}
    deploy:
      resources:
        limits:
          memory: 620M
    restart: unless-stopped
    environment:
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://${KAFKA_HOST}:9092
      - KAFKA_LISTENERS=PLAINTEXT://${KAFKA_HOST}:9092,CONTROLLER://${KAFKA_HOST}:9093
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@${KAFKA_HOST}:9093
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://${OTEL_COLLECTOR_HOST}:${OTEL_COLLECTOR_PORT_HTTP}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES=${OTEL_RESOURCE_ATTRIBUTES},service.criticality=low
      - OTEL_SERVICE_NAME=transaction-event-stream
      - KAFKA_HEAP_OPTS=-Xmx400m -Xms400m
    healthcheck:
      test: nc -z transaction-event-stream 9092
      start_period: 10s
      interval: 5s
      timeout: 10s
      retries: 10
    logging: *logging

  llm:
    image: ${IMAGE_REGISTRY}/llm:${VERSION}
    container_name: llm
    build:
      context: ./
      dockerfile: ${LLM_DOCKERFILE}
      cache_from:
        - ${IMAGE_REGISTRY}/llm:${VERSION}
    deploy:
      resources:
        limits:
          memory: 50M
    restart: unless-stopped
    environment:
      - FLAGD_HOST
      - FLAGD_PORT
    ports:
      - "${LLM_PORT}"
    depends_on:
      incident-control:
        condition: service_started
    logging: *logging

  astronomy-db:
    image: ${POSTGRES_IMAGE}
    container_name: astronomy-db
    deploy:
      resources:
        limits:
          memory: 80M
    restart: unless-stopped
    ports:
      - ${POSTGRES_PORT}
    command: postgres -c shared_preload_libraries=pg_stat_statements
    environment:
      - POSTGRES_PASSWORD
    volumes:
      - ./src/postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
    logging: *logging

  valkey-cart:
    image: ${VALKEY_IMAGE}
    container_name: valkey-cart
    user: valkey
    deploy:
      resources:
        limits:
          memory: 20M
    restart: unless-stopped
    ports:
      - "${VALKEY_PORT}"
    logging: *logging

  # ********************
  # Telemetry Components
  # ********************

  # OpenTelemetry Collector — exports all signals to IAX via OTLP/gRPC.
  # Config files are baked into the image (Dockerfile.iax); no volume mounts
  # needed, so runners without repo access can pull and run directly.
  otel-collector:
    image: ${IMAGE_REGISTRY}/otel-collector:${VERSION}
    container_name: otel-collector
    build:
      context: ./src/otel-collector
      dockerfile: Dockerfile.iax
      cache_from:
        - ${IMAGE_REGISTRY}/otel-collector:${VERSION}
    deploy:
      resources:
        limits:
          memory: 200M
    restart: unless-stopped
    command: [ "--config=/etc/otelcol-config.yml", "--config=/etc/otelcol-config-extras.yml" ]
    user: 0:0
    volumes:
      - ${HOST_FILESYSTEM}:/hostfs:ro
      - ${DOCKER_SOCK}:/var/run/docker.sock:ro
    ports:
      - "${OTEL_COLLECTOR_PORT_GRPC}"
      - "${OTEL_COLLECTOR_PORT_HTTP}"
    logging: *logging
    environment:
      - FRONTEND_PROXY_ADDR
      - HOST_FILESYSTEM
      - IAX_OTLP_ENDPOINT
      - IAX_OTLP_INSECURE
      - IAX_OTLP_INSECURE_SKIP_VERIFY
      - IAX_INGESTION_USERNAME
      - IAX_INGESTION_PASSWORD
      - IMAGE_PROVIDER_HOST
      - IMAGE_PROVIDER_PORT
      - KAFKA_ADDR
      - OTEL_COLLECTOR_HOST
      - OTEL_COLLECTOR_PORT_GRPC
      - OTEL_COLLECTOR_PORT_HTTP
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_PASSWORD
      - POSTGRES_MONITORING_PASSWORD
      - GOMEMLIMIT=160MiB
