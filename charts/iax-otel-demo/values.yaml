  # -- trade-audit (Python) — product reviews service
  trade-audit:
    enabled: true
    useDefault:
      env: true
    service:
      port: 3551
    resources:
      limits:
        memory: 200Mi
    env:
      - name: OTEL_SERVICE_NAME
        value: trade-audit
      - name: PRODUCT_REVIEWS_PORT
        value: "3551"
      - name: OTEL_PYTHON_LOG_CORRELATION
        value: "true"
      - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
        value: "true"
      - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
      - name: DB_CONNECTION_STRING
        value: "host=astronomy-db user=astronomy_user password=astronomy_password dbname=astronomy_db"
      - name: LLM_BASE_URL
        value: "http://llm:8000/v1"
      - name: OPENAI_API_KEY
        value: dummy
      - name: LLM_MODEL
        value: astronomy-llm
      - name: PRODUCT_CATALOG_ADDR
        value: "instrument-reference-data:3550"
      - name: FLAGD_HOST
        value: incident-control
      - name: FLAGD_PORT
        value: "8013"
      - name: LLM_HOST
        value: llm
      - name: LLM_PORT
        value: "8000"
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.criticality=medium"

  # -- market-data-quotes (PHP) — quote service
  market-data-quotes:
    enabled: true
    useDefault:
      env: true
    service:
      port: 8090
    resources:
      limits:
        memory: 60Mi
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: 'http://{{ include "iax-otel-demo.name" . }}-otel-collector:4318'
      - name: OTEL_SERVICE_NAME
        value: market-data-quotes
      - name: IPV6_ENABLED
        value: "false"
      - name: QUOTE_PORT
        value: "8090"
      - name: OTEL_PHP_AUTOLOAD_ENABLED
        value: "true"
      - name: OTEL_PHP_INTERNAL_METRICS_ENABLED
        value: "true"
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.criticality=low"

  # -- smart-order-recommendation (Python) — recommendation service
  smart-order-recommendation:
    enabled: true
    useDefault:
      env: true
    service:
      port: 9001
    resources:
      limits:
        memory: 500Mi
    env:
      - name: OTEL_SERVICE_NAME
        value: smart-order-recommendation
      - name: RECOMMENDATION_PORT
        value: "9001"
      - name: PRODUCT_CATALOG_ADDR
        value: "instrument-reference-data:3550"
      - name: FLAGD_HOST
        value: incident-control
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_PYTHON_LOG_CORRELATION
        value: "true"
      - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.criticality=medium"

  # -- settlement-instructions (Rust) — shipping service
  settlement-instructions:
    enabled: true
    useDefault:
      env: true
    service:
      port: 50050
    resources:
      limits:
        memory: 30Mi
    env:
      - name: OTEL_SERVICE_NAME
        value: settlement-instructions
      - name: IPV6_ENABLED
        value: "false"
      - name: SHIPPING_PORT
        value: "50050"
      - name: QUOTE_ADDR
        value: "http://market-data-quotes:8090"
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.criticality=high"

# ---------------------------------------------------------------------------
# Infrastructure services
# ---------------------------------------------------------------------------

  # -- incident-control — flagd feature-flag service + flagd-ui sidecar
  # flagd and flagd-ui share a writable emptyDir volume so the UI can
  # persist flag changes that flagd picks up via file-watch.
  incident-control:
    enabled: true
    useDefault:
      env: false
    imageOverride:
      repository: ghcr.io/open-feature/flagd
      tag: v0.14.2
    ports:
      - name: flagd
        value: 8013
      - name: ofrep
        value: 8016
      - name: flagd-ui
        value: 4000
    resources:
      limits:
        memory: 75Mi
    args:
      - start
      - --uri
      - file:./etc/flagd/demo.flagd.json
    initContainers:
      - name: copy-flagd-config
        image: busybox:1.37
        command: ["sh", "-c", "cp /src/* /dest/"]
        volumeMounts:
          - name: flagd-config-ro
            mountPath: /src
          - name: flagd-config
            mountPath: /dest
    mountedConfigMaps:
      - name: flagd-config-ro
        mountPath: /unused
        configMapName: incident-control-flagd-config
      - name: flagd-config
        mountPath: /etc/flagd
        writable: true
    sidecars:
      - name: incident-control-ui
        image: '{{ .defaultValues.image.repository }}/incident-control-ui:{{ .defaultValues.image.tag }}'
        imagePullPolicy: '{{ .defaultValues.image.pullPolicy }}'
        ports:
          - containerPort: 4000
            name: flagd-ui
        env:
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: 'http://{{ include "iax-otel-demo.name" . }}-otel-collector:4318'
          - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
            value: cumulative
          - name: OTEL_RESOURCE_ATTRIBUTES
            value: "service.namespace=iax-otel-demo,service.version=1.0.3,service.criticality=low"
          - name: OTEL_SERVICE_NAME
            value: incident-control-ui
          - name: FLAGD_UI_PORT
            value: "4000"
          - name: SECRET_KEY_BASE
            value: "yYrECL4qbNwleYInGJYvVnSkwJuSQJ4ijPTx5tirGUXrbznFIBFVJdPl5t6O9ASw"
          - name: PHX_HOST
            value: "localhost"
        resources:
          limits:
            memory: 400Mi
        volumeMounts:
          - name: flagd-config
            mountPath: /app/data
    env:
      - name: FLAGD_OTEL_COLLECTOR_URI
        value: '{{ include "iax-otel-demo.name" . }}-otel-collector:4317'
      - name: FLAGD_METRICS_EXPORTER
        value: otel
      - name: GOMEMLIMIT
        value: "60MiB"
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: "service.namespace=iax-otel-demo,service.version=1.0.3,service.criticality=low"
      - name: OTEL_SERVICE_NAME
        value: incident-control

  # -- incident-control-ui — now runs as a sidecar in the incident-control pod
  # so flagd and flagd-ui share a writable volume for flag persistence.
  incident-control-ui:
    enabled: false

  # -- trade-event-stream — Kafka broker
  trade-event-stream:
    enabled: true
    useDefault:
      env: true
    service:
      port: 9092
    resources:
      limits:
        memory: 620Mi
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: 'http://{{ include "iax-otel-demo.name" . }}-otel-collector:4318'
      - name: OTEL_SERVICE_NAME
        value: trade-event-stream
      - name: KAFKA_ADVERTISED_LISTENERS
        value: "PLAINTEXT://trade-event-stream:9092"
      - name: KAFKA_LISTENERS
        value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      - name: KAFKA_CONTROLLER_QUORUM_VOTERS
        value: "1@localhost:9093"
      - name: KAFKA_HEAP_OPTS
        value: "-Xmx400m -Xms400m"
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: "service.criticality=low"
    livenessProbe:
      tcpSocket:
        port: 9092
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 10
      failureThreshold: 6

  # -- llm — mock LLM service
  llm:
    enabled: true
    useDefault:
      env: false
    service:
      port: 8000
    resources:
      limits:
        memory: 200Mi
    env:
      - name: FLAGD_HOST
        value: incident-control
      - name: FLAGD_PORT
        value: "8013"

  # -- astronomy-db — PostgreSQL
  astronomy-db:
    enabled: true
    useDefault:
      env: false
    imageOverride:
      repository: postgres
      tag: "17.8"
    service:
      port: 5432
    resources:
      limits:
        memory: 256Mi
    args:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
    mountedConfigMaps:
      - name: postgresql-init
        mountPath: /docker-entrypoint-initdb.d
    env:
      - name: POSTGRES_PASSWORD
        value: changeit

  # -- valkey-cart — Valkey (Redis-compatible) for the cart
  valkey-cart:
    enabled: true
    useDefault:
      env: false
    imageOverride:
      repository: ghcr.io/valkey-io/valkey
      tag: 9.0.2-alpine3.23
    service:
      port: 6379
    resources:
      limits:
        memory: 30Mi
    securityContext:
      runAsUser: 999
      runAsGroup: 1000
    env: []

# ---------------------------------------------------------------------------
# Ingress for the API gateway (fix-api-gateway / Envoy)
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: iax-otel-demo.local
      paths:
