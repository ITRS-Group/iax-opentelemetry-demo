      - name: IPV6_ENABLED
        value: "false"
      - name: PAYMENT_PORT
        value: "50051"
      - name: FLAGD_HOST
        value: incident-control
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
