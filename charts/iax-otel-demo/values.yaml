    env:
      - name: OTEL_SERVICE_NAME
        value: instrument-reference-data
      - name: PRODUCT_CATALOG_PORT
        value: "3550"
      - name: FLAGD_HOST
        value: incident-control
      - name: FLAGD_PORT
        value: "8013"
      - name: GOMEMLIMIT
        value: "16MiB"
      - name: OTEL_SEMCONV_STABILITY_OPT_IN
