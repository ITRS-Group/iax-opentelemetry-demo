{{- if .Values.serviceAccount.create }}
{{- $ctx := set . "serviceAccount" .Values.serviceAccount -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "iax-otel-demo.serviceAccountName" $ctx }}
  labels:
    {{- include "iax-otel-demo.labels" (dict "Chart" .Chart "Release" .Release "name" "serviceaccount") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
